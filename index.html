<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大地質感工作日誌系統</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #e6d5c3 0%, #c5b097 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 80% 透明度玻璃面板 */
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(139, 115, 85, 0.15);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        h2 {
            margin-top: 0;
            color: #5c4a3c;
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #6e5a4b;
            font-size: 14px;
        }

        input[type="date"], input[type="text"], textarea, input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d3c2b0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            color: #4a3c31;
        }

        textarea { resize: vertical; height: 80px; }

        /* 50% 肉感按鈕 */
        .btn {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.1s ease;
            box-sizing: border-box;
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn-submit {
            background-color: #8c7355;
            box-shadow: 0 6px 0px #5c4a3c, 0 8px 15px rgba(0, 0, 0, 0.15);
        }
        .btn-submit:active {
            box-shadow: 0 2px 0px #5c4a3c, 0 3px 6px rgba(0, 0, 0, 0.1);
            transform: translateY(4px);
        }
        .btn-submit.loading {
            background-color: #bfae99 !important;
            box-shadow: 0 2px 0px #8c7355 !important;
            transform: translateY(4px);
            cursor: not-allowed;
        }

        .btn-refresh {
            background-color: #b39f89;
            box-shadow: 0 4px 0px #82715e, 0 6px 10px rgba(0, 0, 0, 0.1);
            font-size: 14px;
            padding: 8px;
            margin-bottom: 15px;
            width: auto;
            display: inline-block;
        }
        .btn-refresh:active {
            box-shadow: 0 1px 0px #82715e;
            transform: translateY(3px);
        }

        #statusMessage { margin-top: 10px; text-align: center; font-weight: bold; }

        /* 【新：調閱歷史資料面板】同樣採用80%玻璃質感 */
        .history-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(139, 115, 85, 0.15);
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #d3c2b0;
            font-size: 14px;
            color: #4a3c31;
        }

        th {
            background-color: rgba(140, 115, 85, 0.2);
            color: #5c4a3c;
            font-weight: bold;
        }

        .img-preview {
            max-width: 60px;
            max-height: 60px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 工作日誌填報</h2>
    <form id="logForm">
        <div class="form-group">
            <label for="date">填寫日期</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
            <label for="item">工作項目</label>
            <input type="text" id="item" name="item" placeholder="請輸入主要工作內容" required>
        </div>
        <div class="form-group">
            <label for="status">執行進度 / 備註</label>
            <textarea id="status" name="status" placeholder="請輸入目前進度或相關備註項目"></textarea>
        </div>
        <div class="form-group">
            <label for="photo">上傳現場相片</label>
            <input type="file" id="photo" accept="image/*">
        </div>
        <button type="submit" class="btn btn-submit" id="submitBtn">確認送出日誌</button>
    </form>
    <div id="statusMessage"></div>
</div>

<!-- 【新：直接在網頁調閱歷史資料區】 -->
<div class="history-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; text-align: left;">🔍 近期歷史日誌 (最新10筆)</h2>
        <button class="btn btn-refresh" id="refreshBtn">🔄 重新整理</button>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th style="width: 20%;">日期</th>
                    <th style="width: 30%;">工作項目</th>
                    <th style="width: 35%;">進度/備註</th>
                    <th style="width: 15%;">現場照片</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="4" style="text-align:center;">正在召喚歷史日誌中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    var scriptUrl = 'https://script.google.com/macros/s/AKfycbztGdCNWm5edZnTvMP4kvA0mDVvvyWhBkS3CIGytPCz_WLH7g8BoxMAq524jO7ylHCUJw/exec';

    document.getElementById('date').valueAsDate = new Date();

    // 載入歷史紀錄的魔法
    function loadHistory() {
        var tbody = document.getElementById('historyBody');
        fetch(scriptUrl)
        .then(res => res.json())
        .then(data => {
            tbody.innerHTML = '';
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">目前尚無紀錄</td></tr>';
                return;
            }
            data.forEach(row => {
                var tr = document.createElement('tr');
                var imgHtml = row.photo ? `<a href="${row.photo}" target="_blank"><img class="img-preview" src="${row.photo}" title="點擊看大圖"></a>` : '無照片';
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td>${row.item}</td>
                    <td>${row.status.replace(/\n/g, '<br>')}</td>
                    <td>${imgHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        })
        .catch(err => {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">讀取歷史資料失敗，請確認 Apps Script 部署版本</td></tr>';
        });
    }

    // 網頁開啟時自動載入，以及點擊按鈕手動重新整理
    window.addEventListener('load', loadHistory);
    document.getElementById('refreshBtn').addEventListener('click', loadHistory);

    // 送出日誌與相片的魔法
    document.getElementById('logForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var submitBtn = document.getElementById('submitBtn');
        var statusMessage = document.getElementById('statusMessage');
        
        submitBtn.classList.add('loading');
        submitBtn.innerText = '正在傳送日誌與相片...';
        statusMessage.innerText = '';
        
        var dateVal = document.getElementById('date').value;
        var itemVal = document.getElementById('item').value;
        var statusVal = document.getElementById('status').value;
        var fileInput = document.getElementById('photo');
        
        var bodyParams = new URLSearchParams();
        bodyParams.append('date', dateVal);
        bodyParams.append('item', itemVal);
        bodyParams.append('status', statusVal);

        // 如果有選照片，轉成二進位文字包裝傳送
        if (fileInput.files.length > 0) {
            var file = fileInput.files[0];
            var reader = new FileReader();
            reader.onload = function(e) {
                bodyParams.append('photoData', e.target.result);
                bodyParams.append('photoName', file.name);
                sendData(bodyParams);
            };
            reader.readAsDataURL(file);
        } else {
            sendData(bodyParams);
        }
    });

    function sendData(params) {
        var submitBtn = document.getElementById('submitBtn');
        var statusMessage = document.getElementById('statusMessage');
        
        fetch(scriptUrl, {
            method: 'POST',
            body: params
        })
        .then(response => response.json())
        .then(data => {
            if(data.result === 'success') {
                statusMessage.style.color = '#3e6b48';
                statusMessage.innerText = '✅ 成功寫入並儲存相片！';
                document.getElementById('item').value = '';
                document.getElementById('status').value = '';
                document.getElementById('photo').value = '';
                loadHistory(); // 成功後自動更新底下表格！
            } else {
                statusMessage.style.color = '#a63a3a';
                statusMessage.innerText = '❌ 失敗：' + data.error;
            }
        })
        .catch(error => {
            statusMessage.style.color = '#a63a3a';
            statusMessage.innerText = '❌ 連線錯誤，請確認Apps Script權限。';
        })
        .finally(() => {
            submitBtn.classList.remove('loading');
            submitBtn.innerText = '確認送出日誌';
        });
    }
</script>
</body>
</html>
