<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業級安全工作日誌系統</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #e6d5c3 0%, #c5b097 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(139, 115, 85, 0.15);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        h2 { margin-top: 0; color: #5c4a3c; text-align: center; font-size: 22px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #6e5a4b; font-size: 14px; }
        
        input[type="date"], input[type="text"], textarea, input[type="file"] {
            width: 100%; padding: 10px; border: 1px solid #d3c2b0;
            background: rgba(255, 255, 255, 0.9); border-radius: 8px;
            box-sizing: border-box; font-size: 14px; color: #4a3c31;
        }
        textarea { resize: vertical; height: 80px; }

        .btn {
            width: 100%; padding: 12px; color: white; border: none; font-size: 16px;
            cursor: pointer; font-weight: bold; border-radius: 12px; transition: all 0.1s ease;
            box-sizing: border-box; display: block; text-align: center; text-decoration: none;
        }
        .btn-submit { background-color: #8c7355; box-shadow: 0 6px 0px #5c4a3c, 0 8px 15px rgba(0, 0, 0, 0.15); }
        .btn-submit:active { box-shadow: 0 2px 0px #5c4a3c; transform: translateY(4px); }

        .login-box {
            background: rgba(243, 230, 213, 0.9);
            border-left: 5px solid #8c7355;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #5c4a3c;
            text-align: center;
        }
        
        .btn-view {
            background-color: #b39f89;
            box-shadow: 0 4px 0px #82715e;
            margin-top: 10px;
        }
        .btn-view:active { box-shadow: 0 1px 0px #82715e; transform: translateY(3px); }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 工作日誌填報 (企業安全版)</h2>
    
    <div class="login-box">
        🔒 系統將透過您的 Google 帳號進行安全填報與相片上傳。
    </div>

    <form id="logForm" method="POST" target="uploadTarget">
        <div class="form-group">
            <label for="date">填寫日期</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
            <label for="item">工作項目</label>
            <input type="text" id="item" name="item" placeholder="請輸入今日主要工作內容" required>
        </div>
        <div class="form-group">
            <label for="status">執行進度 / 備註</label>
            <textarea id="status" name="status" placeholder="請輸入目前進度或相關備註項目"></textarea>
        </div>
        <div class="form-group">
            <label for="photo">上傳現場相片</label>
            <input type="file" id="photo" accept="image/*">
        </div>
        
        <input type="hidden" id="photoData" name="photoData">
        <input type="hidden" id="photoName" name="photoName">

        <button type="submit" class="btn btn-submit" id="submitBtn">確認送出日誌</button>
        
        <button type="button" class="btn btn-view" id="viewBtn">🔍 網頁直接調閱先前資料</button>
    </form>
</div>

<iframe name="uploadTarget" id="uploadTarget" style="display:none;"></iframe>

<script>
    var scriptUrl = 'https://script.google.com/macros/s/AKfycbztGdCNWm5edZnTvMP4kvA0mDVvvyWhBkS3CIGytPCz_WLH7g8BoxMAq524jO7ylHCUJw/exec';
    
    // 設定表單傳送網址
    document.getElementById('logForm').action = scriptUrl;
    document.getElementById('date').valueAsDate = new Date();

    // 點擊調閱按鈕，直接打開剛才那個吐資料的乾淨安全畫面
    document.getElementById('viewBtn').addEventListener('click', function() {
        window.open(scriptUrl, '_blank');
    });

    // 處理送出
    document.getElementById('logForm').addEventListener('submit', function(e) {
        var fileInput = document.getElementById('photo');
        var submitBtn = document.getElementById('submitBtn');
        
        submitBtn.disabled = true;
        submitBtn.innerText = '正在安全傳送中...';

        if (fileInput.files.length > 0) {
            e.preventDefault(); // 阻擋一下，先轉檔照片
            var file = fileInput.files[0];
            var reader = new FileReader();
            reader.onload = function(evt) {
                document.getElementById('photoData').value = evt.target.result;
                document.getElementById('photoName').value = file.name;
                // 轉檔完成，正式發射表單
                document.getElementById('logForm').submit();
                resetForm();
            };
            reader.readAsDataURL(file);
        } else {
            // 沒有照片直接發射
            resetForm();
        }
    });

    function resetForm() {
        setTimeout(function() {
            var submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.innerText = '確認送出日誌';
            alert('📝 日誌傳送指令已發射！可點擊下方調閱按鈕確認有無成功寫入。');
            document.getElementById('item').value = '';
            document.getElementById('status').value = '';
            document.getElementById('photo').value = '';
            document.getElementById('photoData').value = '';
            document.getElementById('photoName').value = '';
        }, 1000);
    }
</script>
</body>
</html>
